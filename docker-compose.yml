version: '3.8'

services:
  # Core API
  api:
    build: ./api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://lumerakai:secure_password@postgres:5432/lumerakai_health
      - REDIS_URL=redis://redis:6379
      - FHIR_SERVER_URL=http://fhir-server:8080/fhir
    depends_on:
      - postgres
      - redis
      - fhir-server
    volumes:
      - ./api:/app
      - /app/node_modules

  # Web Frontend
  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules

  # Assistant Service
  assistant:
    build: ./assistant
    ports:
      - "3002:3002"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - AI_PROVIDERS=${AI_PROVIDERS:-google,ollama,mistral}
      - AI_ROTATION_ENABLED=${AI_ROTATION_ENABLED:-true}
    depends_on:
      - ollama
    volumes:
      - ./assistant:/app
      - /app/node_modules

  # FHIR Server
  fhir-server:
    image: hapiproject/hapi:latest
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:postgresql://postgres:5432/hapi_fhir
      - spring.datasource.username=hapi
      - spring.datasource.password=hapi_password
    depends_on:
      - postgres

  # Database
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=lumerakai_health
      - POSTGRES_USER=lumerakai
      - POSTGRES_PASSWORD=secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Ollama for local AI
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*

volumes:
  postgres_data:
  ollama_data: